# =============================================================================
# Orion SmartNest – Lighting Automations
# Rules:
#   1. Turn light ON when motion is detected in any room.
#   2. Turn light OFF after configurable inactivity period (default 10 min).
# =============================================================================

# ---------------------------------------------------------------------------
# 1. Living Room – Turn light ON on motion
# ---------------------------------------------------------------------------
- id: living_room_light_on_motion
  alias: "Lighting | Living Room – Light ON (motion)"
  description: "Turn the living room light on when motion is detected."
  trigger:
    - platform: state
      entity_id: binary_sensor.orion_living_room_motion
      to: "on"
  condition:
    # Only fire if light is not already on (avoids unnecessary writes)
    - condition: state
      entity_id: switch.orion_living_room_light
      state: "off"
  action:
    - service: switch.turn_on
      target:
        entity_id: switch.orion_living_room_light
  mode: single

# ---------------------------------------------------------------------------
# 2. Living Room – Turn light OFF after inactivity period
# ---------------------------------------------------------------------------
- id: living_room_light_off_no_motion
  alias: "Lighting | Living Room – Light OFF (no motion)"
  description: >
    Turn the living room light off after the configured inactivity delay
    once motion stops. Delay is read from the input_number helper.
  trigger:
    - platform: state
      entity_id: binary_sensor.orion_living_room_motion
      to: "off"
      for:
        minutes: "{{ states('input_number.light_auto_off_delay') | int }}"
  condition:
    - condition: state
      entity_id: switch.orion_living_room_light
      state: "on"
  action:
    - service: switch.turn_off
      target:
        entity_id: switch.orion_living_room_light
    - service: logbook.log
      data:
        name: "SmartNest"
        message: "Living room light auto-off – no motion for {{ states('input_number.light_auto_off_delay') | int }} minutes."
  mode: single


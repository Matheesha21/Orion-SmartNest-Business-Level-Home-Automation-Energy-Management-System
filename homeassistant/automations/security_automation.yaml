# =============================================================================
# Orion SmartNest – Security Automations
# Rules:
#   1. Alert when door/window opens while Security Mode is active.
#   2. Alert on motion detection while Security Mode is active.
#   3. Trigger buzzer siren on security breach.
#   4. Notify when Security Mode is armed / disarmed.
# =============================================================================

# ---------------------------------------------------------------------------
# 1. Living Room Door – Alert when opened in Security Mode
# ---------------------------------------------------------------------------
- id: security_living_room_door_alert
  alias: "Security | Living Room – Door opened (security mode active)"
  description: "Send alert and trigger buzzer when living room door opens in security mode."
  trigger:
    - platform: state
      entity_id: binary_sensor.orion_living_room_door
      to: "on"
  condition:
    - condition: state
      entity_id: input_boolean.security_mode
      state: "on"
  action:
    - service: notify.persistent_notification
      data:
        title: "🚨 SECURITY ALERT – SmartNest"
        message: "⚠️ Living room door was opened while security mode is ACTIVE!"
        notification_id: "security_alert_living_room_door"
    # Trigger buzzer siren on the living-room node (light entity mapped to buzzer output)
    - service: light.turn_on
      target:
        entity_id: light.orion_living_room_security_buzzer
      data:
        brightness: 255
    # Auto-silence buzzer after 30 seconds
    - delay: "00:00:30"
    - service: light.turn_off
      target:
        entity_id: light.orion_living_room_security_buzzer
    - service: logbook.log
      data:
        name: "SmartNest Security"
        message: "ALERT: Living room door opened during security mode."
  mode: single


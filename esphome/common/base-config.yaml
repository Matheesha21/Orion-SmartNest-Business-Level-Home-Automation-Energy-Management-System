# =============================================================================
# Orion SmartNest – ESPHome Base Configuration (Shared Package)
# Included by all room nodes via the !include_dir_merge_named / packages key.
# =============================================================================

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Static fallback AP when Wi-Fi is unavailable
  ap:
    ssid: "${device_name} Fallback"
    password: !secret ap_password

captive_portal:

# Encrypted native ESPHome API (used by Home Assistant integration)
api:
  encryption:
    key: !secret api_encryption_key

# OTA updates – protect with a password stored in secrets.yaml
ota:
  - platform: esphome
    password: !secret ota_password

# Web server for local diagnostics (disable in production if not needed)
web_server:
  port: 80
  auth:
    username: admin
    password: !secret web_server_password

# System-level sensors available on every node
sensor:
  - platform: wifi_signal
    name: "${friendly_name} Wi-Fi Signal"
    update_interval: 60s
    entity_category: diagnostic

  - platform: uptime
    name: "${friendly_name} Uptime"
    entity_category: diagnostic

binary_sensor:
  - platform: status
    name: "${friendly_name} Status"
    entity_category: diagnostic

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "${friendly_name} IP Address"
      entity_category: diagnostic
    ssid:
      name: "${friendly_name} Connected SSID"
      entity_category: diagnostic
    mac_address:
      name: "${friendly_name} MAC Address"
      entity_category: diagnostic
    scan_results:
      name: "${friendly_name} Latest Scan Results"
      entity_category: diagnostic

# Node watchdog – restart if firmware crashes
watchdog:

logger:
  level: INFO
